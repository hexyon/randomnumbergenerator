<!DOCTYPE html>
<html>
<head>
    <title>Random Number Generator</title>
    <style>
        body {
            background-color: #1e1f2a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        button {
            background-color: #3C6F99; /* Color */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }

        p {
            color: #ffffff;
            font-size: 24px;
            text-align: center;
        }

        #tick {
            visibility: hidden;
            color: green;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div>
        <button onclick="displayRandomNumber()">Generate Random Number</button>
        <p id="randomNumber"></p>
        <button id="copyButton" onclick="copyToClipboard()">Copy</button>
        <span id="tick">&#10003;</span>
    </div>

    <script src="randomNumberGenerator.js"></script>
</body>
</html>
