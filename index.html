<!DOCTYPE html>
<html>
<head>
    <title>Random Number Generator</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            background: #000000; /* Solid black background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #E3E3E3; /* White text color for better legibility */
            font-size: 18px;
        }

        button {
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: #FD8BC1; 
            color: #000000; /* Black text color for better legibility */
            cursor: pointer;
            box-shadow: 0px 0px 10px rgba(255,255,255,0.1);
            margin-top: 10px;
        }

        button:hover {
            background-color: #DD3795; /* Darker shade on hover */
        }

        p {
            font-size: 24px;
            text-align: center;
            color: #E3E3E3; /* White text color for better legibility */
        }

        #tick {
            visibility: hidden;
            color: #5BCEFA;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div>
        <button id="generateButton" onclick="displayRandomNumber()">Generate Random Number</button>
        <p id="randomNumber"></p>
        <button id="copyButton" onclick="copyToClipboard()">Copy</button>
        <span id="tick">✓</span>
    </div>

    <script src="randomNumberGenerator.js"></script>
</body>
</html>
