<!DOCTYPE html>
<html>
<head>
    <title>Random Number Generator</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            background: black url('https://cdn.discordapp.com/attachments/1208431337011154977/1211358495451119656/background.jpg?ex=65ede883&is=65db7383&hm=0f38e4e8c036c80f3fc9aa6e16f6c2fff7c3fbaf8b025e1c0d01dc888f803935&') no-repeat center center fixed; 
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #E3E3E3; 
            font-size: 18px;
        }

        button {
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: #FC9BC2; 
            color: #000000; 
            cursor: pointer;
            box-shadow: 0px 0px 10px rgba(255,255,255,0.1);
            margin-top: 10px;
        }

        button:hover {
            background-color: #F9629F; 
        }

        p {
            font-size: 24px;
            text-align: center;
            color: #F5F5F5; 
        }

        #tick {
            visibility: hidden;
            color: #F9629F;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div>
        <button id="generateButton" onclick="displayRandomNumber()">Generate Random Number</button>
        <p id="randomNumber"></p>
        <button id="copyButton" onclick="copyToClipboard()">Copy</button>
        <span id="tick">✓</span>
    </div>

    <script src="randomNumberGenerator.js"></script>
</body>
</html>
